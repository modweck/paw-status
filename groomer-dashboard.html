<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PawStatus — Groomer Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --accent: #f5c842;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --muted: #888;
      --success: #4ade80;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--text); }
    .date-badge {
      margin-left: auto;
      font-size: 13px;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 999px;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .dog-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .dog-card.active { border-color: var(--accent); }
    .dog-card.completed { opacity: 0.5; }

    .dog-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .dog-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .dog-info h3 {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .dog-info p { font-size: 13px; color: var(--muted); }
    .time-badge {
      margin-left: auto;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(245, 200, 66, 0.1);
      padding: 4px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .progress-track {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .progress-track::-webkit-scrollbar { display: none; }

    .progress-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .step-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s;
    }
    .step-dot.done { background: var(--success); }
    .step-dot.active { background: var(--accent); box-shadow: 0 0 0 3px rgba(245,200,66,0.2); }
    .step-label {
      font-size: 9px;
      color: var(--muted);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .step-label.active { color: var(--accent); }
    .step-label.done { color: var(--success); }

    .progress-line {
      flex: 1;
      height: 2px;
      background: var(--border);
      min-width: 20px;
      margin-bottom: 14px;
      transition: background 0.3s;
    }
    .progress-line.done { background: var(--success); }

    .action-btn {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.15s;
      margin-bottom: 8px;
    }
    .action-btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: #ffd700; }
    .btn-ready { background: var(--success); color: #000; font-size: 17px; padding: 18px; }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1f1f1f;
      border: 1px solid var(--success);
      color: var(--success);
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.3s ease;
      white-space: nowrap;
      z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .log-section { margin-top: 32px; }
    .log-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .log-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .log-text { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .log-text strong { color: var(--text); font-weight: 600; }
    .log-time { margin-left: auto; font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

    .empty-state { text-align: center; padding: 48px 0; color: var(--muted); }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">Paw<span>Status</span></div>
    <div class="date-badge" id="todayDate"></div>
  </div>

  <div class="section-title" style="display:flex;align-items:center;gap:10px;">
    <span>Upcoming Appointments</span>
    <button id="refreshBtn" onclick="loadAppointments()" style="margin-left:auto;background:#1a1a1a;color:#f0f0f0;border:1px solid #2a2a2a;border-radius:999px;padding:4px 12px;font-size:11px;cursor:pointer;font-family:inherit;">↻ Refresh</button>
  </div>
  <div id="appointmentsList"></div>

  <div class="log-section">
    <div class="section-title">Notifications Sent</div>
    <div id="notificationLog">
      <div class="empty-state">
        <div class="emoji">🔔</div>
        <p>Notifications you send will appear here</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">✅ Notification sent!</div>

<script>
const SUPABASE_URL = 'https://faizrqajtdttcklflcbz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_R4rLnRKIxwCeWywdRTwrFA_F-16fCeC';

const STAGES = [
  { key: 'booked',           label: 'Booked',     icon: '📅' },
  { key: 'checked_in',       label: 'Checked In', icon: '✅' },
  { key: 'bathing',          label: 'Bathing',    icon: '🛁' },
  { key: 'drying',           label: 'Drying',     icon: '💨' },
  { key: 'almost_ready',     label: 'Almost!',    icon: '✂️' },
  { key: 'ready_for_pickup', label: 'Ready!',     icon: '🎉' },
  { key: 'picked_up',        label: 'Picked Up',  icon: '👋' },
];

const NEXT_ACTION = {
  booked:           { label: 'Check In Dog',                   type: 'checked_in',       style: 'btn-primary' },
  checked_in:       { label: 'Start Bathing 🛁',                type: 'bathing',          style: 'btn-primary' },
  bathing:          { label: 'Start Drying 💨',                 type: 'drying',           style: 'btn-primary' },
  drying:           { label: 'Almost Ready — Notify Owner ✂️',  type: 'almost_ready',     style: 'btn-primary' },
  almost_ready:     { label: '🎉 Dog is Ready for Pickup!',     type: 'ready_for_pickup', style: 'btn-ready'   },
  ready_for_pickup: { label: '✅ Mark as Picked Up',            type: 'picked_up',        style: 'btn-primary' },
};

let appointments = [];
let notificationLog = [];

async function loadAppointments() {
  const now = new Date();
  const nowIso = now.toISOString();
  const url = SUPABASE_URL + '/rest/v1/appointments' +
    '?select=id,service,price,scheduled_at,status,dogs(name,breed,customers(name,phone,onesignal_player_id)),groomers(name,salon)' +
    '&scheduled_at=gte.' + encodeURIComponent(new Date(now.getTime() - 24*3600*1000).toISOString()) +
    '&order=scheduled_at.asc&limit=30';
  const r = await fetch(url, { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } });
  if (!r.ok) { console.error('load failed', await r.text()); return; }
  const rows = await r.json();
  appointments = rows.map(mapRow);
  renderAppointments();
}

function mapRow(r) {
  const dog = r.dogs || {};
  const owner = (dog.customers) || {};
  const groomer = r.groomers || {};
  const when = new Date(r.scheduled_at);
  return {
    id: r.id,
    dogName: dog.name || 'Unknown',
    breed: dog.breed || '',
    ownerName: owner.name || 'Guest',
    ownerPhone: owner.phone || null,
    service: r.service,
    price: r.price,
    groomerName: groomer.name || 'Groomer',
    salonName: groomer.salon || groomer.name || 'Salon',
    status: r.status,
    scheduledAt: when,
    time: when.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }),
    dateLabel: when.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }),
    emoji: '🐾',
  };
}

function statusIndex(status) {
  const i = STAGES.findIndex(s => s.key === status);
  return i < 0 ? 0 : i;
}

function renderAppointments() {
  const container = document.getElementById('appointmentsList');
  if (!appointments.length) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">📅</div><p>No upcoming appointments yet.<br>Book one from the customer app.</p></div>';
    return;
  }
  container.innerHTML = appointments.map((appt) => {
    const idx = statusIndex(appt.status);
    const isCompleted = appt.status === 'picked_up';
    const isActive = idx > 0 && !isCompleted;
    const cardClass = isCompleted ? 'completed' : isActive ? 'active' : '';
    const visibleStages = STAGES.slice(0, 6);

    const progressBar = visibleStages.map((stage, i) => {
      const isDone = i < idx;
      const isCurrent = i === idx;
      return '<div class="progress-step">' +
        '<div class="step-dot ' + (isDone ? 'done' : isCurrent ? 'active' : '') + '"></div>' +
        '<div class="step-label ' + (isDone ? 'done' : isCurrent ? 'active' : '') + '">' + stage.label + '</div>' +
        '</div>' +
        (i < visibleStages.length - 1 ? '<div class="progress-line ' + (isDone ? 'done' : '') + '"></div>' : '');
    }).join('');

    const nextAction = NEXT_ACTION[appt.status];
    const actionBtn = isCompleted
      ? '<button class="action-btn btn-disabled" disabled>✅ Picked Up</button>'
      : nextAction
        ? '<button class="action-btn ' + nextAction.style + '" onclick="updateStatus(\'' + appt.id + '\', \'' + nextAction.type + '\')">' + nextAction.label + '</button>'
        : '';

    return '<div class="dog-card ' + cardClass + '" id="card-' + appt.id + '">' +
      '<div class="dog-header">' +
        '<div class="dog-avatar">' + appt.emoji + '</div>' +
        '<div class="dog-info">' +
          '<h3>' + appt.dogName + '</h3>' +
          '<p>' + (appt.breed ? appt.breed + ' · ' : '') + appt.service + '</p>' +
          '<p style="font-size:11px;color:#666;margin-top:2px;">' + appt.salonName + ' · owner: ' + appt.ownerName + '</p>' +
        '</div>' +
        '<div class="time-badge">' + appt.dateLabel + ' · ' + appt.time + '</div>' +
      '</div>' +
      '<div class="progress-track">' + progressBar + '</div>' +
      actionBtn +
    '</div>';
  }).join('');
}

async function updateStatus(apptId, newStatus) {
  const appt = appointments.find(a => a.id === apptId);
  if (!appt) return;

  const r = await fetch(SUPABASE_URL + '/rest/v1/appointments?id=eq.' + apptId, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY, Prefer: 'return=minimal' },
    body: JSON.stringify({ status: newStatus, status_updated_at: new Date().toISOString() })
  });
  if (!r.ok) { showToast('⚠️ Could not update — ' + r.status); return; }

  appt.status = newStatus;
  renderAppointments();
  addToLog(appt, newStatus);

  try {
    const resp = await fetch('/.netlify/functions/send-sms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: newStatus,
        toPhone: appt.ownerPhone,
        dogName: appt.dogName,
        salonName: appt.salonName,
        appointmentTime: appt.time,
      }),
    });
    const result = await resp.json();
    if (result.success) showToast('📩 SMS sent to ' + appt.ownerName);
    else showToast('📱 Status saved (SMS failed: ' + (result.error || resp.status) + ')');
  } catch (err) {
    showToast('📱 Status saved (SMS unavailable locally)');
  }
}

function addToLog(appt, type) {
  const stage = STAGES.find(s => s.key === type);
  const now = new Date();
  notificationLog.unshift({
    icon: (stage && stage.icon) || '🔔',
    dogName: appt.dogName,
    ownerName: appt.ownerName,
    type: (stage && stage.label) || type,
    time: now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }),
  });
  renderLog();
}

function renderLog() {
  const container = document.getElementById('notificationLog');
  if (notificationLog.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">🔔</div><p>Notifications you send will appear here</p></div>';
    return;
  }
  container.innerHTML = notificationLog.map(entry =>
    '<div class="log-item">' +
      '<div class="log-icon">' + entry.icon + '</div>' +
      '<div class="log-text"><strong>' + entry.ownerName + '</strong> notified — ' + entry.dogName + ' status updated to <strong>' + entry.type + '</strong></div>' +
      '<div class="log-time">' + entry.time + '</div>' +
    '</div>'
  ).join('');
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-US', {
  weekday: 'long', month: 'short', day: 'numeric'
});

loadAppointments();
setInterval(loadAppointments, 15000);
</script>
</body>
</html>
