<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PawStatus — Find a Groomer</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf8f4; --card: #ffffff; --border: #ede9e0;
      --accent: #f5c842; --dark: #1a1512; --text: #2d2820;
      --muted: #9a8f80; --success: #2ecc71; --warning: #f39c12;
      --radius: 20px; --shadow: 0 2px 16px rgba(0,0,0,0.07);
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    .header { background: var(--dark); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); }
    .logo span { color: #fff; }
    .change-breed-btn { font-size: 13px; color: #aaa; cursor: pointer; display: none; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* BREED SCREEN */
    .breed-hero { background: var(--dark); padding: 28px 20px 24px; color: #fff; }
    .breed-hero h1 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; line-height: 1.2; margin-bottom: 6px; }
    .breed-hero h1 span { color: var(--accent); }
    .breed-hero p { font-size: 14px; color: #aaa; margin-bottom: 20px; }
    .breed-search-wrap { display: flex; align-items: center; background: #fff; border-radius: 14px; padding: 0 16px; gap: 10px; height: 52px; }
    .breed-search-wrap input { flex: 1; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); background: transparent; }
    .breed-search-wrap input::placeholder { color: var(--muted); }
    .breed-section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 20px 20px 10px; }
    .breed-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; padding: 0 20px 120px; }
    .breed-tile { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 16px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 12px; }
    .breed-tile:active { transform: scale(0.97); }
    .breed-tile.selected { border-color: var(--accent); background: rgba(245,200,66,0.08); }
    .breed-emoji { font-size: 32px; flex-shrink: 0; }
    .breed-info .breed-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
    .breed-info .breed-size { font-size: 12px; color: var(--muted); }
    .breed-cta { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 20px; background: var(--bg); border-top: 1px solid var(--border); z-index: 50; }
    .breed-cta button { width: 100%; background: var(--accent); color: var(--dark); border: none; border-radius: 14px; padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; }
    .breed-cta button:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    /* RESULTS SCREEN */
    .results-header { background: var(--dark); padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .results-header-info h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: #fff; }
    .results-header-info p { font-size: 13px; color: #aaa; }
    .filters-wrap { padding: 12px 20px 0; background: var(--dark); }
    .filters-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
    .filters-scroll::-webkit-scrollbar { display: none; }
    .filter-chip { padding: 7px 14px; border-radius: 999px; font-size: 13px; font-weight: 500; white-space: nowrap; cursor: pointer; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,0.15); color: #ccc; background: rgba(255,255,255,0.05); transition: all 0.15s; }
    .filter-chip.active { background: var(--accent); color: var(--dark); border-color: var(--accent); font-weight: 600; }
    .sort-bar { padding: 12px 20px; display: flex; align-items: center; }
    .results-count { font-size: 13px; color: var(--muted); }
    .results-count strong { color: var(--text); font-weight: 600; }
    .groomers-list { padding: 0 20px 100px; }

    /* GROOMER CARD */
    .groomer-card { background: var(--card); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s; }
    .groomer-card:active { transform: scale(0.98); }
    .card-image { width: 100%; height: 150px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .salon-emoji-bg { font-size: 64px; opacity: 0.25; }
    .card-image-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 55%); }
    .card-badges { position: absolute; top: 12px; left: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-available { background: var(--success); color: #fff; }
    .badge-limited { background: var(--warning); color: #fff; }
    .badge-full { background: #e74c3c; color: #fff; }
    .badge-specialty { background: rgba(255,255,255,0.92); color: var(--dark); }
    .avail-bottom { position: absolute; bottom: 12px; left: 12px; }
    .avail-slots { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
    .slot-pill { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: #fff; padding: 3px 9px; border-radius: 999px; font-size: 12px; font-weight: 500; }
    .slot-pill.open { background: rgba(46,204,113,0.35); border-color: rgba(46,204,113,0.5); }
    .breed-price-banner { background: var(--accent); padding: 11px 16px; display: flex; align-items: center; justify-content: space-between; }
    .bpb-breed { font-size: 13px; font-weight: 700; color: var(--dark); }
    .bpb-time { font-size: 12px; color: rgba(26,21,18,0.55); margin-top: 1px; }
    .bpb-price { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--dark); }
    .card-body { padding: 14px 16px 16px; }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
    .salon-name { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
    .rating { display: flex; align-items: center; gap: 4px; font-size: 14px; font-weight: 600; }
    .rating span { color: var(--muted); font-size: 12px; font-weight: 400; }
    .card-meta { display: flex; gap: 14px; font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .all-prices-toggle { font-size: 13px; color: var(--muted); cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
    .all-prices-grid { display: none; grid-template-columns: repeat(2,1fr); gap: 7px; margin-bottom: 14px; }
    .all-prices-grid.open { display: grid; }
    .price-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; }
    .price-item.match-breed { border-color: var(--accent); background: rgba(245,200,66,0.07); }
    .price-item .pi-breed { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
    .price-item .pi-price { font-weight: 700; font-size: 15px; }
    .price-item .pi-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .pi-match-tag { font-size: 10px; color: #7a5c00; font-weight: 600; background: rgba(245,200,66,0.3); padding: 1px 6px; border-radius: 999px; display: inline-block; margin-top: 3px; }
    .book-btn { width: 100%; background: var(--dark); color: #fff; border: none; border-radius: 12px; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
    .book-btn.full { background: #e0dbd0; color: var(--muted); cursor: not-allowed; }

    /* SHEET */
    .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }
    .sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-radius: 24px 24px 0 0; z-index: 201; max-height: 92vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1); padding-bottom: 40px; }
    .sheet.open { transform: translateY(0); }
    .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 14px auto 0; }
    .sheet-header { padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; }
    .sheet-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
    .close-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--bg); border: none; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .sheet-section { padding: 18px 20px 0; }
    .sheet-section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

    /* BREED PRICE CARD IN SHEET */
    .breed-price-card { background: rgba(245,200,66,0.1); border: 1.5px solid var(--accent); border-radius: 14px; padding: 14px 16px; margin-bottom: 0; display: flex; align-items: center; justify-content: space-between; }
    .bpc-label { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
    .bpc-breed { font-size: 16px; font-weight: 700; }
    .bpc-price { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; }
    .bpc-time { font-size: 12px; color: var(--muted); text-align: right; margin-top: 2px; }

    /* ADD-ONS */
    .addon-list { display: flex; flex-direction: column; gap: 8px; }
    .addon-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px;
      padding: 13px 14px; cursor: pointer; transition: all 0.15s;
    }
    .addon-row.selected { border-color: var(--accent); background: rgba(245,200,66,0.07); }
    .addon-left { display: flex; align-items: center; gap: 10px; }
    .addon-icon { font-size: 20px; width: 28px; text-align: center; }
    .addon-name { font-weight: 600; font-size: 14px; margin-bottom: 1px; }
    .addon-desc { font-size: 12px; color: var(--muted); }
    .addon-right { display: flex; align-items: center; gap: 10px; }
    .addon-price { font-weight: 700; font-size: 14px; white-space: nowrap; }
    .addon-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.15s; flex-shrink: 0; }
    .addon-row.selected .addon-check { background: var(--accent); border-color: var(--accent); }

    /* TOTAL BAR */
    .total-bar { background: var(--dark); border-radius: 14px; padding: 14px 16px; margin-top: 14px; display: flex; align-items: center; justify-content: space-between; }
    .total-bar .total-label { font-size: 13px; color: #aaa; }
    .total-bar .total-items { font-size: 12px; color: #777; margin-top: 2px; }
    .total-bar .total-amount { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--accent); }

    /* TIME SLOTS */
    .day-tabs { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; }
    .day-tabs::-webkit-scrollbar { display: none; }
    .day-tab { padding: 8px 16px; border-radius: 999px; border: 1.5px solid var(--border); font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
    .day-tab.active { background: var(--dark); color: #fff; border-color: var(--dark); }
    .slot-note { font-size: 12px; color: var(--muted); margin-bottom: 10px; font-style: italic; }
    .time-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .time-slot { border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.15s; }
    .time-slot.available:hover { border-color: var(--accent); }
    .time-slot.selected { border-color: var(--accent); background: rgba(245,200,66,0.12); }
    .t-time { font-size: 14px; font-weight: 600; }
    .t-label { font-size: 11px; color: var(--success); margin-top: 2px; }

    /* CONFIRM BTN */
    .confirm-btn { margin: 20px 20px 0; width: calc(100% - 40px); background: var(--accent); color: var(--dark); border: none; border-radius: 14px; padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; }
    .confirm-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    /* CONFIRMATION SCREEN */
    .confirm-screen { text-align: center; padding: 40px 24px; }
    .confirm-icon { font-size: 64px; margin-bottom: 16px; }
    .confirm-screen h2 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; margin-bottom: 8px; }
    .confirm-screen p { font-size: 15px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    .confirm-detail { background: var(--bg); border-radius: 14px; padding: 16px; margin-bottom: 20px; text-align: left; }
    .confirm-row { display: flex; justify-content: space-between; font-size: 14px; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .confirm-row:last-child { border-bottom: none; }
    .confirm-row .lbl { color: var(--muted); }
    .confirm-row .val { font-weight: 600; }
    .notif-note { background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); border-radius: 12px; padding: 14px; font-size: 13px; color: #1a7a40; display: flex; gap: 10px; align-items: flex-start; text-align: left; margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">Paw<span>Status</span></div>
  <div class="change-breed-btn" id="changeBreeBtn" onclick="goToScreen('breed')">Change breed</div>
</div>

<!-- SCREEN 1: BREED PICKER -->
<div class="screen active" id="screen-breed">
  <div class="breed-hero">
    <h1>What breed is<br>your <span>dog?</span></h1>
    <p>We'll show exact prices from every groomer near you.</p>
    <div class="breed-search-wrap">
      <span style="font-size:18px;color:var(--muted)">🔍</span>
      <input type="text" placeholder="Search breed..." id="breedSearch" oninput="filterBreeds()" />
    </div>
  </div>
  <div class="breed-section-title">Popular breeds</div>
  <div class="breed-grid" id="breedGrid"></div>
  <div class="breed-cta">
    <button id="breedCtaBtn" disabled>Select your breed above</button>
  </div>
</div>

<!-- SCREEN 2: RESULTS -->
<div class="screen" id="screen-results">
  <div class="results-header">
    <button class="back-btn" onclick="goToScreen('breed')">←</button>
    <div class="results-header-info">
      <h2 id="resultsTitle">Groomers near you</h2>
      <p id="resultsSubtitle">Upper East Side</p>
    </div>
  </div>
  <div class="filters-wrap">
    <div class="filters-scroll" id="filtersRow">
      <div class="filter-chip active" data-filter="all">All</div>
      <div class="filter-chip" data-filter="available">Available Today</div>
      <div class="filter-chip" data-filter="specialist">Specialists</div>
      <div class="filter-chip" data-filter="budget">Lowest Price</div>
      <div class="filter-chip" data-filter="nearby">Nearest</div>
      <div class="filter-chip" data-filter="rated">Top Rated</div>
    </div>
  </div>
  <div class="sort-bar">
    <div class="results-count"><strong id="resultCount">4</strong> groomers near you</div>
  </div>
  <div class="groomers-list" id="groomersList"></div>
</div>

<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"><div id="sheetContent"></div></div>

<script>
// ── BREEDS ──────────────────────────────────────────────────────────────────
// groomTime = approx full groom minutes (drives how many slots fit in a day)
const breeds = [
  { id:'goldendoodle',    name:'Goldendoodle',     emoji:'🐩', size:'Medium–Large', groomTime:150 },
  { id:'labrador',        name:'Labrador',          emoji:'🦮', size:'Large',        groomTime:90  },
  { id:'frenchbulldog',   name:'French Bulldog',    emoji:'🐾', size:'Small',        groomTime:60  },
  { id:'yorkie',          name:'Yorkie',            emoji:'🐕', size:'Small',        groomTime:75  },
  { id:'husky',           name:'Husky',             emoji:'🐺', size:'Large',        groomTime:180 },
  { id:'poodle',          name:'Poodle',            emoji:'🐩', size:'Small–Large',  groomTime:120 },
  { id:'shihtzhu',        name:'Shih Tzu',          emoji:'🐶', size:'Small',        groomTime:90  },
  { id:'goldenretriever', name:'Golden Retriever',  emoji:'🦮', size:'Large',        groomTime:120 },
  { id:'cockapoo',        name:'Cockapoo',          emoji:'🐕', size:'Small–Medium', groomTime:100 },
  { id:'maltese',         name:'Maltese',           emoji:'🐶', size:'Small',        groomTime:75  },
  { id:'bernedoodle',     name:'Bernedoodle',       emoji:'🐩', size:'Large',        groomTime:180 },
  { id:'chihuahua',       name:'Chihuahua',         emoji:'🐾', size:'Small',        groomTime:45  },
  { id:'cavapoo',         name:'Cavapoo',           emoji:'🐕', size:'Small–Medium', groomTime:90  },
  { id:'boxer',           name:'Boxer',             emoji:'🦮', size:'Large',        groomTime:90  },
  { id:'pomsky',          name:'Pomsky',            emoji:'🐺', size:'Medium',       groomTime:120 },
  { id:'mini_schnauzer',  name:'Mini Schnauzer',    emoji:'🐶', size:'Small',        groomTime:80  },
];

// ── ADD-ONS (realistic NYC prices) ──────────────────────────────────────────
// Some add-ons cost more for larger/longer-groom dogs
function getAddons(groomTime) {
  const big = groomTime >= 120; // large/long-coat dog
  return [
    { id:'nail',      icon:'💅', name:'Nail Trim',          desc:'Clip + file all nails',           price: 15 },
    { id:'teeth',     icon:'🦷', name:'Teeth Brushing',     desc:'Enzymatic toothpaste clean',       price: 20 },
    { id:'ears',      icon:'👂', name:'Ear Cleaning',       desc:'Gentle flush + wipe',              price: 15 },
    { id:'deshed',    icon:'🪮', name:'De-shed Treatment',  desc:'Removes loose undercoat',          price: big ? 45 : 30 },
    { id:'blueberry', icon:'🫐', name:'Blueberry Facial',   desc:'Brightens coat around face',       price: 20 },
    { id:'pawbalm',   icon:'🐾', name:'Paw Balm Treatment', desc:'Moisturizes & heals dry paws',     price: 15 },
    { id:'cologne',   icon:'🌸', name:'Cologne / Spritz',   desc:'Finishing scent spray',            price: 10 },
    { id:'bow',       icon:'🎀', name:'Bow or Bandana',     desc:'Cute finishing touch',             price:  5 },
  ];
}

// ── BREED PRICING ────────────────────────────────────────────────────────────
const breedPricing = {
  1: { goldendoodle:{price:120,time:150,specialist:true}, labrador:{price:95,time:90,specialist:false}, frenchbulldog:{price:70,time:60,specialist:false}, yorkie:{price:75,time:75,specialist:false}, husky:{price:140,time:180,specialist:false}, poodle:{price:110,time:120,specialist:true}, shihtzhu:{price:80,time:90,specialist:false}, goldenretriever:{price:110,time:120,specialist:false}, cockapoo:{price:95,time:100,specialist:true}, maltese:{price:75,time:75,specialist:false}, bernedoodle:{price:145,time:180,specialist:true}, chihuahua:{price:55,time:45,specialist:false}, cavapoo:{price:90,time:90,specialist:true}, boxer:{price:90,time:90,specialist:false}, pomsky:{price:105,time:120,specialist:false}, mini_schnauzer:{price:80,time:80,specialist:false} },

// ── SLOT GENERATOR ───────────────────────────────────────────────────────────
// Salon opens 9am, closes 7pm = 600 minutes of work time
// Slots are spaced by groomTime + 15 min buffer
// Weekdays get full schedule, some days pre-booked randomly for realism
function generateSlots(groomTime, dayIndex) {
  const openMinute = 9 * 60;   // 9:00 AM
  const closeMinute = 19 * 60; // 7:00 PM
  const interval = groomTime + 15; // groom time + 15 min buffer between dogs
  const slots = [];
  for (let m = openMinute; m + groomTime <= closeMinute; m += interval) {
    const h = Math.floor(m / 60);
    const min = m % 60;
    const label = `${h > 12 ? h - 12 : h}:${min === 0 ? '00' : min} ${h >= 12 ? 'PM' : 'AM'}`;
    slots.push(label);
  }
  // Simulate some slots already booked — varies by day
  const bookingRate = [0.5, 0.3, 0.2, 0.4, 0.25][dayIndex % 5];
  return slots.filter(() => Math.random() > bookingRate);
}

// Pre-seed slots so they don't change on re-render
const slotCache = {};
function getSlots(groomerId, breedId, dayIndex) {
  const key = `${groomerId}-${breedId}-${dayIndex}`;
  if (!slotCache[key]) {
    const bp = breedPricing[groomerId][breedId];
    slotCache[key] = bp ? generateSlots(bp.time, dayIndex) : [];
  }
  return slotCache[key];
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let selectedBreed = null;
let activeFilter = 'all';
let selectedGroomer = null;
let selectedDay = 'Today';
let selectedDayIndex = 0;
let selectedTime = null;
let selectedAddons = new Set();
let sheetMode = 'booking';

const DAYS = ['Today','Tomorrow','Wed','Thu','Fri'];

// ── BREED SCREEN ──────────────────────────────────────────────────────────────
function renderBreeds(list) {
  document.getElementById('breedGrid').innerHTML = list.map(b => `
    <div class="breed-tile ${selectedBreed?.id===b.id?'selected':''}" onclick="selectBreed('${b.id}')">
      <div class="breed-emoji">${b.emoji}</div>
      <div class="breed-info">
        <div class="breed-name">${b.name}</div>
        <div class="breed-size">${b.size}</div>
      </div>
    </div>
  `).join('');
}

function filterBreeds() {
  const q = document.getElementById('breedSearch').value.toLowerCase();
  renderBreeds(q ? breeds.filter(b=>b.name.toLowerCase().includes(q)) : breeds);
}

function selectBreed(id) {
  selectedBreed = breeds.find(b=>b.id===id);
  renderBreeds(breeds);
  const btn = document.getElementById('breedCtaBtn');
  btn.disabled = false;
  btn.textContent = `See prices for ${selectedBreed.name} →`;
  btn.onclick = goToResults;
}

function goToResults() {
  if (!selectedBreed) return;
  document.getElementById('resultsTitle').textContent = `${selectedBreed.emoji} ${selectedBreed.name} groomers`;
  document.getElementById('resultsSubtitle').textContent = `Upper East Side · prices shown for your breed`;
  activeFilter = 'all';
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.filter==='all'));
  renderCards();
  goToScreen('results');
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
function getAvailability(gid, bid) {
  const todaySlots = getSlots(gid, bid, 0);
  if (todaySlots.length === 0) return 'full';
  if (todaySlots.length <= 1) return 'limited';
  return 'available';
}

function renderCards() {
  let list = [...groomers];
  const bid = selectedBreed?.id;

  if (activeFilter==='available') list=list.filter(g=>getAvailability(g.id,bid)!=='full');
  else if (activeFilter==='specialist') list=list.filter(g=>g.specialtyBreeds.includes(bid));
  else if (activeFilter==='budget') list=[...list].sort((a,b)=>(breedPricing[a.id][bid]?.price||999)-(breedPricing[b.id][bid]?.price||999));
  else if (activeFilter==='nearby') list=[...list].sort((a,b)=>a.distance-b.distance);
  else if (activeFilter==='rated') list=[...list].sort((a,b)=>b.rating-a.rating);

  document.getElementById('resultCount').textContent = list.length;

  document.getElementById('groomersList').innerHTML = list.map(g => {
    const bp = breedPricing[g.id][bid]||{price:'—',time:'—'};
    const avail = getAvailability(g.id, bid);
    const isFull = avail==='full';
    const isSpec = g.specialtyBreeds.includes(bid);
    const todaySlots = getSlots(g.id, bid, 0).slice(0,3);
    const totalToday = getSlots(g.id, bid, 0).length;

    const allPrices = breeds.map(b=>{
      const p = breedPricing[g.id][b.id];
      if (!p) return null;
      return {...b, price:p.price, time:p.time, isMatch:b.id===bid};
    }).filter(Boolean).sort((a,b)=>a.isMatch?-1:b.isMatch?1:a.price-b.price);

    return `
      <div class="groomer-card" onclick="openSheet(${g.id})">
        <div class="card-image" style="background:${g.gradient}">
          <div class="salon-emoji-bg">${g.emoji}</div>
          <div class="card-image-overlay"></div>
          <div class="card-badges">
            ${isFull?`<div class="badge badge-full">Fully Booked</div>`:avail==='limited'?`<div class="badge badge-limited">⚡ 1 slot left</div>`:`<div class="badge badge-available">● Available Today</div>`}
            ${isSpec?`<div class="badge badge-specialty">🏅 ${selectedBreed.name} specialist</div>`:''}
          </div>
          ${!isFull?`<div class="avail-bottom">
            <div style="font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:5px">Today's open slots</div>
            <div class="avail-slots">
              ${todaySlots.map(s=>`<div class="slot-pill open">${s}</div>`).join('')}
              ${totalToday>3?`<div class="slot-pill">+${totalToday-3} more</div>`:''}
            </div>
          </div>`:`<div class="avail-bottom" style="font-size:13px;color:rgba(255,255,255,0.5)">Check this week for openings</div>`}
        </div>

        <div class="breed-price-banner">
          <div>
            <div class="bpb-breed">${selectedBreed.emoji} ${selectedBreed.name} full groom</div>
            <div class="bpb-time">⏱ ~${bp.time} min</div>
          </div>
          <div class="bpb-price">$${bp.price}</div>
        </div>

        <div class="card-body">
          <div class="card-top">
            <div class="salon-name">${g.name}</div>
            <div class="rating">⭐ ${g.rating} <span>(${g.reviews})</span></div>
          </div>
          <div class="card-meta">
            <span>📍 ${g.address}</span>
            <span>🚶 ${g.distance} mi</span>
          </div>

          <div class="all-prices-toggle" onclick="event.stopPropagation();togglePrices(${g.id})">
            <span id="tog-${g.id}">▸</span> See all breed prices
          </div>
          <div class="all-prices-grid" id="prices-${g.id}">
            ${allPrices.map(p=>`
              <div class="price-item ${p.isMatch?'match-breed':''}">
                <div class="pi-breed">${p.name}</div>
                <div class="pi-price">$${p.price}</div>
                <div class="pi-time">⏱ ~${p.time} min</div>
                ${p.isMatch?`<div class="pi-match-tag">your dog</div>`:''}
              </div>
            `).join('')}
          </div>

          <button class="book-btn ${isFull?'full':''}" onclick="event.stopPropagation();${!isFull?`openSheet(${g.id})`:''}">
            ${isFull?'😔 Fully Booked':`📅 Book for $${bp.price}`}
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function togglePrices(id) {
  const grid = document.getElementById(`prices-${id}`);
  const icon = document.getElementById(`tog-${id}`);
  const open = grid.classList.toggle('open');
  icon.textContent = open ? '▾' : '▸';
}

// ── SHEET ──────────────────────────────────────────────────────────────────────
function openSheet(id) {
  selectedGroomer = groomers.find(g=>g.id===id);
  selectedDay = 'Today';
  selectedDayIndex = 0;
  selectedTime = null;
  selectedAddons = new Set();
  sheetMode = 'booking';
  renderSheet();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

function calcTotal() {
  const bp = breedPricing[selectedGroomer.id][selectedBreed?.id];
  const base = bp?.price || 0;
  const addons = getAddons(bp?.time || 60);
  const addonTotal = addons.filter(a=>selectedAddons.has(a.id)).reduce((s,a)=>s+a.price, 0);
  return { base, addonTotal, total: base + addonTotal };
}

function toggleAddon(id) {
  if (selectedAddons.has(id)) selectedAddons.delete(id);
  else selectedAddons.add(id);
  renderSheet();
}

function renderSheet() {
  const g = selectedGroomer;
  const bp = breedPricing[g.id][selectedBreed?.id] || {price:'—', time:60};
  const addons = getAddons(bp.time);
  const { base, addonTotal, total } = calcTotal();

  if (sheetMode === 'confirm') {
    const selectedAddonNames = addons.filter(a=>selectedAddons.has(a.id)).map(a=>a.name).join(', ');
    document.getElementById('sheetContent').innerHTML = `
      <div class="confirm-screen">
        <div class="confirm-icon">🎉</div>
        <h2>You're booked!</h2>
        <p>We'll send real-time updates as your dog goes through grooming — plus a 15-min heads-up when they're ready.</p>
        <div class="confirm-detail">
          <div class="confirm-row"><span class="lbl">Salon</span><span class="val">${g.name}</span></div>
          <div class="confirm-row"><span class="lbl">Breed</span><span class="val">${selectedBreed?.name}</span></div>
          <div class="confirm-row"><span class="lbl">Full groom</span><span class="val">$${base}</span></div>
          ${addonTotal > 0 ? `<div class="confirm-row"><span class="lbl">Add-ons</span><span class="val">$${addonTotal}</span></div>` : ''}
          <div class="confirm-row"><span class="lbl">Total</span><span class="val" style="color:var(--dark);font-size:16px">$${total}</span></div>
          <div class="confirm-row"><span class="lbl">Day</span><span class="val">${selectedDay}</span></div>
          <div class="confirm-row"><span class="lbl">Time</span><span class="val">${selectedTime}</span></div>
          ${selectedAddonNames ? `<div class="confirm-row"><span class="lbl">Services</span><span class="val" style="text-align:right;max-width:55%">${selectedAddonNames}</span></div>` : ''}
        </div>
        <div class="notif-note">
          <span style="font-size:20px">🔔</span>
          <div>You'll be notified when your dog is <strong>checked in → bathing → drying → ready</strong>. No more waiting!</div>
        </div>
        <button class="confirm-btn" onclick="closeSheet()">Done ✓</button>
      </div>
    `;
    return;
  }

  const slots = getSlots(g.id, selectedBreed?.id, selectedDayIndex);

  document.getElementById('sheetContent').innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">${g.name}</div>
      <button class="close-btn" onclick="closeSheet()">✕</button>
    </div>

    <!-- BASE PRICE -->
    <div class="sheet-section">
      <div style="display:flex;gap:14px;font-size:13px;color:var(--muted);margin-bottom:14px">
        <span>⭐ ${g.rating} (${g.reviews})</span><span>📍 ${g.distance} mi away</span>
      </div>
      <div class="breed-price-card">
        <div>
          <div class="bpc-label">Full groom — included</div>
          <div class="bpc-breed">${selectedBreed?.emoji} ${selectedBreed?.name}</div>
        </div>
        <div style="text-align:right">
          <div class="bpc-price">$${base}</div>
          <div class="bpc-time">⏱ ~${bp.time} min</div>
        </div>
      </div>
    </div>

    <!-- ADD-ONS -->
    <div class="sheet-section">
      <div class="sheet-section-title">Add-on services</div>
      <div class="addon-list">
        ${addons.map(a => `
          <div class="addon-row ${selectedAddons.has(a.id)?'selected':''}" onclick="toggleAddon('${a.id}')">
            <div class="addon-left">
              <div class="addon-icon">${a.icon}</div>
              <div>
                <div class="addon-name">${a.name}</div>
                <div class="addon-desc">${a.desc}</div>
              </div>
            </div>
            <div class="addon-right">
              <div class="addon-price">+$${a.price}</div>
              <div class="addon-check">${selectedAddons.has(a.id)?'✓':''}</div>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- RUNNING TOTAL -->
      <div class="total-bar">
        <div>
          <div class="total-label">Total</div>
          <div class="total-items">${selectedAddons.size > 0 ? `Full groom + ${selectedAddons.size} add-on${selectedAddons.size>1?'s':''}` : 'Full groom only'}</div>
        </div>
        <div class="total-amount">$${total}</div>
      </div>
    </div>

    <!-- TIME SLOTS -->
    <div class="sheet-section">
      <div class="sheet-section-title">Pick a day & time</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px;font-style:italic">
        ⏱ Slots based on ~${bp.time} min groom for ${selectedBreed?.name}
      </div>
      <div class="day-tabs">
        ${DAYS.map((d,i) => {
          const s = getSlots(g.id, selectedBreed?.id, i);
          const dot = s.length===0?'🔴':s.length<=1?'🟡':'🟢';
          return `<div class="day-tab ${d===selectedDay?'active':''}" onclick="selectDay('${d}',${i})">${d} ${dot}</div>`;
        }).join('')}
      </div>

      <div class="time-grid">
        ${slots.length===0
          ? `<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--muted);font-size:14px">😔 No slots — try another day</div>`
          : slots.map(t=>`
            <div class="time-slot available ${selectedTime===t?'selected':''}" onclick="selectTime('${t}')">
              <div class="t-time">${t}</div>
              <div class="t-label">Open</div>
            </div>
          `).join('')}
      </div>
    </div>

    <button class="confirm-btn" ${selectedTime?'':'disabled'} onclick="confirmBooking()">
      ${selectedTime ? `Book ${selectedTime} — $${total} →` : 'Select a time to book'}
    </button>
  `;
}

function selectDay(d, i) { selectedDay=d; selectedDayIndex=i; selectedTime=null; renderSheet(); }
function selectTime(t) { selectedTime=t; renderSheet(); }
function confirmBooking() { sheetMode='confirm'; renderSheet(); }

// ── NAV ───────────────────────────────────────────────────────────────────────
function goToScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  document.getElementById('changeBreeBtn').style.display = name==='results'?'block':'none';
  window.scrollTo(0,0);
}

document.getElementById('filtersRow').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  activeFilter = chip.dataset.filter;
  renderCards();
});

renderBreeds(breeds);
</script>
